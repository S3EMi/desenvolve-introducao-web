<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pesquisa de Satisfação</title>
</head>
<body>
    <h1>Pesquisa de Satisfação</h1>

    <form method="post">
        <h2>Dados Pessoais</h2>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" value="" required>
        <br><br>
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" value="" required>
        <br><br>
        <label for="telefone">Telefone:</label><br>
        <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone" value="">
        <br><br>

        <h2>Pesquisa</h2>

        <p>1. Você ficou satisfeito com o atendimento?</p>
        <input type="radio" id="satisfeito_sim" name="satisfacao" value="sim">
        <label for="satisfeito_sim">Sim</label><br>

        <input type="radio" id="satisfeito_nao" name="satisfacao" value="nao">
        <label for="satisfeito_nao">Não</label>
        <br><br>

        <p>2. Você recomendaria nosso serviço?</p>
        <input type="radio" id="recomenda_sim" name="recomendacao" value="sim">
        <label for="recomenda_sim">Sim</label><br>

        <input type="radio" id="recomenda_nao" name="recomendacao" value="nao">
        <label for="recomenda_nao">Não</label>
        <br><br>

        <p>3. Como você avalia nosso serviço?</p>
        <select id="avaliacao" name="avaliacao">
            <option value="">Selecione</option>
            <option value="excelente">Excelente</option>
            <option value="bom">Bom</option>
            <option value="regular">Regular</option>
            <option value="ruim">Ruim</option>
        </select>
        <br><br>
        <input type="checkbox" id="compartilhar" name="compartilhar" value="sim">
        <label for="compartilhar">
            Autorizo o compartilhamento das minhas respostas com terceiros
        </label>
        <br><br>
        <input type="submit" value="Enviar">
    </form>

</body>
</html>
