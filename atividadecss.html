<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício CSS</title>
    <style>
        a {
            color: red;
        }

        a:hover {
            color: lemonchiffon;
        }
        p {
            font-family: Arial, sans-serif;
        }

        h1 + p {
            font-weight: bold;
        }

        .destaque {
            font-family: Arial, sans-serif;
        }

        p.destaque {
            font-weight: bold;
        }

        strong.destaque {
            color: red;
        }
    </style>
</head>
<body>

    <h1>Título Principal</h1>
    <p>Parágrafo em negrito</p>

    <p>Parágrafo normal com fonte Arial.</p>

    <p class="destaque">Parágrafo com classe destaque (negrito).</p>

    <p>Texto com <strong class="destaque">palavra destacada</strong> em vermelho.</p>

    <a href="#">Link de exemplo</a>

</body>
</html>
